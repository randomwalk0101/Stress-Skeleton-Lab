<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BiRead Options</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main>
      <h1>BiRead Options</h1>

      <form id="optionsForm">
        <label>
          Provider
          <select id="provider">
            <option value="mymemory">MyMemory</option>
            <option value="libretranslate">LibreTranslate</option>
          </select>
        </label>

        <label>
          LibreTranslate endpoint
          <input id="libreEndpoint" type="url" placeholder="https://libretranslate.com/translate">
        </label>

        <label>
          LibreTranslate API key
          <input id="libreApiKey" type="password" autocomplete="off">
        </label>

        <label>
          Pronunciation analyzer provider
          <select id="pronunciationProvider">
            <option value="openai">OpenAI</option>
            <option value="gemini">Gemini</option>
          </select>
        </label>

        <label>
          OpenAI API key
          <input id="openaiApiKey" type="password" autocomplete="off" placeholder="sk-...">
        </label>

        <label>
          OpenAI model
          <input id="openaiModel" type="text" placeholder="gpt-4.1-mini">
        </label>

        <label>
          Gemini API key
          <input id="geminiApiKey" type="password" autocomplete="off" placeholder="AIza...">
        </label>

        <label>
          Gemini model
          <input id="geminiModel" type="text" placeholder="gemini-3.5-flash">
        </label>

        <label>
          Minimum text length
          <input id="minTextLength" type="number" min="1" max="240">
        </label>

        <label>
          Maximum page items
          <input id="maxPageItems" type="number" min="1" max="300">
        </label>

        <label class="checkbox">
          <input id="pageAutoTranslate" type="checkbox">
          Auto-translate supported pages
        </label>

        <label class="checkbox">
          <input id="hoverDictionary" type="checkbox">
          Enable hover dictionary
        </label>

        <label class="checkbox">
          <input id="autoSpeak" type="checkbox">
          Pronounce hovered words automatically
        </label>

        <label class="checkbox">
          <input id="pronunciationAnalyzer" type="checkbox">
          Enable selection pronunciation analyzer
        </label>

        <button type="submit">Save options</button>
      </form>

      <p id="status" role="status"></p>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>
