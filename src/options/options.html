<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BiRead Pronunciation Options</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main>
      <h1>BiRead Pronunciation Options</h1>

      <form id="optionsForm">
        <label>
          Pronunciation analyzer provider
          <select id="pronunciationProvider">
            <option value="local">Local rules</option>
            <option value="openai">OpenAI</option>
            <option value="gemini">Gemini</option>
          </select>
        </label>

        <label>
          OpenAI API key
          <input id="openaiApiKey" type="password" autocomplete="off" placeholder="sk-...">
        </label>

        <label>
          OpenAI model
          <input id="openaiModel" type="text" placeholder="gpt-4.1-mini">
        </label>

        <label>
          Gemini API key
          <input id="geminiApiKey" type="password" autocomplete="off" placeholder="AIza...">
        </label>

        <label>
          Gemini model
          <input id="geminiModel" type="text" placeholder="gemini-3.5-flash">
        </label>

        <label>
          Local Edge TTS endpoint
          <input id="localTtsEndpoint" type="url" placeholder="http://127.0.0.1:8787">
        </label>

        <label>
          Minimum text length
          <input id="minTextLength" type="number" min="1" max="240">
        </label>

        <label>
          Maximum page items
          <input id="maxPageItems" type="number" min="1" max="300">
        </label>

        <label class="checkbox">
          <input id="pronunciationAnalyzer" type="checkbox">
          Enable selection pronunciation analyzer
        </label>

        <button type="submit">Save options</button>
      </form>

      <p id="status" role="status"></p>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>
