<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BiRead Reader</title>
    <link rel="stylesheet" href="reader.css">
    <link rel="stylesheet" href="../content/content.css">
  </head>
  <body>
    <main>
      <aside>
        <h1>BiRead Reader</h1>
        <input id="fileInput" type="file" accept=".txt,.md,.srt,.vtt,.html,.htm,.pdf,text/*,application/pdf">
        <button id="analyzeSelection" type="button" class="secondary">Analyze selected text</button>
        <p class="hint">Load a local text or PDF file, then select any passage to analyze its pronunciation.</p>
        <p id="status"></p>
      </aside>
      <article id="document"></article>
    </main>
    <script type="module" src="reader.js"></script>
  </body>
</html>
