<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stress Skeleton</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <h1>Stress Skeleton</h1>
        <label class="switch">
          <input id="enabled" type="checkbox">
          <span></span>
        </label>
      </header>

      <label class="checkline">
        <input id="autoSpeak" type="checkbox">
        Auto pronounce
      </label>

      <label class="checkline">
        <input id="youtubeStressOverlay" type="checkbox">
        YouTube realtime stress
      </label>

      <div class="actions">
        <button id="openReader" type="button">Open local reader</button>
      </div>

      <p id="status" role="status"></p>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
